<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toshi Token Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #333; }
        button { background: #0052ff; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; transition: 0.3s; }
        button:hover { background: #003db3; }
        .info { margin-top: 20px; text-align: left; background: #fafafa; padding: 10px; border-radius: 5px; font-size: 14px; }
        .status { color: green; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Toshi Dashboard</h2>
    <p>Apne tokens check karein</p>
    
    <button id="connectBtn">Connect Wallet</button>

    <div id="dashboard" style="display: none;" class="info">
        <p><strong>Wallet:</strong> <span id="walletAddr">...</span></p>
        <p><strong>Balance:</strong> <span id="tokenBalance">0.00</span> TOSHI</p>
        <p class="status">Connected to Base</p>
    </div>
</div>

<script>
    // 1. Configuration (Apna contract address yaha dalein)
    const tokenAddress = "0x...YOUR_CONTRACT_ADDRESS_HERE";
    const abi = [
        "function balanceOf(address owner) view returns (uint256)",
        "function decimals() view returns (uint8)"
    ];

    const connectBtn = document.getElementById('connectBtn');
    const dashboard = document.getElementById('dashboard');
    const walletAddr = document.getElementById('walletAddr');
    const tokenBalance = document.getElementById('tokenBalance');

    async function connect() {
        if (window.ethereum) {
            try {
                // Wallet connect request
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();
                const address = await signer.getAddress();

                // UI Update
                walletAddr.innerText = address.slice(0, 6) + "..." + address.slice(-4);
                connectBtn.style.display = 'none';
                dashboard.style.display = 'block';

                // Token Balance Fetch karein
                const contract = new ethers.Contract(tokenAddress, abi, provider);
                const balance = await contract.balanceOf(address);
                const decimals = await contract.decimals();
                
                tokenBalance.innerText = ethers.formatUnits(balance, decimals);
            } catch (error) {
                console.error("User ne connection reject kiya", error);
                alert("Wallet connect karna zaruri hai!");
            }
        } else {
            alert("Kripya MetaMask install karein!");
        }
    }

    connectBtn.addEventListener('click', connect);
</script>

</body>
</html>
