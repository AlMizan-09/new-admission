<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission 2026 | Brainware University</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; color: #333; }
        header { background-color: #004a99; color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo h1 { font-size: 1.5rem; }
        .contact-info a { color: #ffcc00; text-decoration: none; font-weight: bold; font-size: 1.1rem; }
        
        .container { max-width: 1000px; margin: 40px auto; background: white; display: flex; flex-wrap: wrap; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .info-section { flex: 1; background-color: #0056b3; color: white; padding: 40px; min-width: 300px; }
        .form-section { flex: 1.5; padding: 40px; min-width: 320px; }
        
        h2 { margin-bottom: 20px; color: #004a99; }
        .info-section h2 { color: #ffcc00; font-size: 1.8rem; }
        .clg-name { color: #ffcc00; font-weight: bold; margin-bottom: 10px; display: block; font-size: 1.2rem; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; font-weight: 600; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; outline: none; background: #fff; }
        input:focus, select:focus { border-color: #004a99; }

        .submit-btn { background-color: #ffcc00; color: #004a99; border: none; padding: 15px 25px; width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer; border-radius: 4px; transition: 0.3s; margin-top: 10px; }
        .submit-btn:hover { background-color: #e6b800; }
        
        .call-now { display: inline-block; margin-top: 20px; background: #25d366; color: white; padding: 10px 20px; text-decoration: none; border-radius: 50px; font-weight: bold; }

        @media (max-width: 768px) { .container { margin: 10px; } .info-section { display: none; } }
    </style>
</head>
<body>

    <header>
        <div class="logo"><h1>Brainware Admission 2026</h1></div>
        <div class="contact-info">Call: <a href="tel:+917478471531">+91 7478471531</a></div>
    </header>

    <div class="container">
        <div class="info-section">
            <span class="clg-name">Brainware University</span>
            <h2>Early Bird Offer!</h2>
            <p>Get up to ₹30,000/- off for a limited period.</p>
            <ul style="list-style: none; margin-top: 20px;">
                <li style="margin-bottom: 12px;">✓ 98% Placed in 2025</li>
                <li style="margin-bottom: 12px;">✓ Advanced Labs</li>
                <li style="margin-bottom: 12px;">✓ Global Exposure</li>
            </ul>
            <a href="tel:+917478471531" class="call-now">Call Helpline</a>
        </div>

        <div class="form-section">
            <h2>Apply Online</h2>
            <form id="admissionForm" action="https://formspree.io/f/mwvawadv" method="POST">
                
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" name="Name" placeholder="Enter name" required>
                </div>

                <div class="form-group">
                    <label>Mobile Number *</label>
                    <input type="tel" name="Mobile" pattern="[0-9]{10}" placeholder="10 digit phone number" required>
                </div>

                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" name="Email" placeholder="example@mail.com" required>
                </div>

                <div class="form-group">
                    <label>Select Course Category *</label>
                    <select id="categorySelect" name="Category" required onchange="updateCourses()">
                        <option value="">-- Select Category --</option>
                        <option value="eng">Engineering & Technology</option>
                        <option value="mgmt">Management & Commerce</option>
                        <option value="sci">Science & Biotechnology</option>
                        <option value="med">Medical & Allied Health Sciences</option>
                        <option value="law">Law</option>
                        <option value="media">Media, Arts & Design</option>
                        <option value="hum">Humanities & Social Sciences</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Choose Course *</label>
                    <select id="courseSelect" name="Course" required disabled>
                        <option value="">-- Select Category First --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>PIN Code *</label>
                    <input type="text" name="Pincode" pattern="[0-9]{6}" placeholder="6 digit PIN" required>
                </div>

                <button type="submit" class="submit-btn" id="subBtn">Register Now</button>
            </form>
        </div>
    </div>

    <script>
        // Courses Data Object
        const courseData = {
            "eng": ["B.Tech CSE", "B.Tech CSE (AI & ML)", "B.Tech CSE (Data Science)", "B.Tech Cyber Security", "B.Tech Biotechnology", "Diploma/LE"],
            "mgmt": ["BBA", "BBA (Business Analytics)", "BBA (Digital Marketing)", "BBA (Hospital Management)", "B.Com (Hons)", "MBA"],
            "sci": ["B.Sc Biotechnology", "B.Sc Agriculture", "B.Sc Food Nutrition", "B.Sc Psychology", "M.Sc Courses"],
            "med": ["B.Pharm", "B.Sc Nursing", "B.Sc Optometry", "Paramedical Courses"],
            "law": ["BA LLB (5 years)", "BBA LLB (5 years)", "LLB (3 years)"],
            "media": ["B.Sc Media Science & Journalism", "B.Sc Animation & Multimedia", "B.Sc Animation, VFX & Gaming"],
            "hum": ["BA English (Hons)", "B.Sc Psychology"]
        };

        function updateCourses() {
            const category = document.getElementById("categorySelect").value;
            const courseSelect = document.getElementById("courseSelect");
            
            // Clear current options
            courseSelect.innerHTML = '<option value="">-- Select Course --</option>';
            
            if (category && courseData[category]) {
                courseSelect.disabled = false;
                courseData[category].forEach(course => {
                    let option = document.createElement("option");
                    option.value = course;
                    option.text = course;
                    courseSelect.appendChild(option);
                });
            } else {
                courseSelect.disabled = true;
                courseSelect.innerHTML = '<option value="">-- Select Category First --</option>';
            }
        }

        document.getElementById('admissionForm').onsubmit = function() {
            document.getElementById('subBtn').innerText = "Submitting...";
        };
    </script>

</body>
</html>
